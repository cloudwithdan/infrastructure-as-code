---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kestra
  namespace: kestra
spec:
  interval: 30m
  chart:
    spec:
      chart: kestra
      version: "1.0.36"
      sourceRef:
        kind: HelmRepository
        name: kestra
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployments:
      standalone:
        enabled: true
        workerThreads: 0
        initContainers:
          - name: init-db
            image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            env:
              - name: INIT_POSTGRES_HOST
                value: "postgres18-rw.cnpg-system.svc.cluster.local"
              - name: INIT_POSTGRES_DBNAME
                value: "kestra"
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: pg-secret
                    key: username
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: pg-secret
                    key: password
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: cloudnative-pg-secret
                    key: password
        dind:
          enabled: false
      webserver:
        enabled: false
      executor:
        enabled: false
      indexer:
        enabled: false
      scheduler:
        enabled: false
      worker:
        enabled: false

    configurations:
      application:
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: "/tmp/kestra-wd/tmp"
          storage:
            type: s3

      secrets:
        - name: kestra-s3-creds
          key: s3.yml
        - name: db-creds
          key: db.yml

    common:
      nodeSelector:
        kubernetes.io/hostname: talos-worker-eu-02
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0

    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: kestra.${SECRET_EXTERNAL_DOMAIN}
      hosts:
        - host: kestra.${SECRET_EXTERNAL_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
