---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kestra
  namespace: kestra
spec:
  interval: 30m
  chart:
    spec:
      chart: kestra
      version: "1.0.36"
      sourceRef:
        kind: HelmRepository
        name: kestra
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployments:
      standalone:
        enabled: true
        workerThreads: 0
        dind:
          enabled: false
      webserver:
        enabled: false
      executor:
        enabled: false
      indexer:
        enabled: false
      scheduler:
        enabled: false
      worker:
        enabled: false

    configurations:
      application:
        datasources:
          default:
            url: jdbc:postgresql://kestra-db-rw.kestra.svc.cluster.local:5432/kestra
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USERNAME}
            password: ${POSTGRES_PASSWORD}
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: s3
            s3:
              bucket: talos-lj-backup
              region: eu-central-1
              endpoint: https://talos-lj-backup.s3.eu-central-1.amazonaws.com
              accessKey: ${S3_ACCESS_KEY_ID}
              secretKey: ${S3_SECRET_ACCESS_KEY}
          tasks:
            tmpDir:
              path: "/tmp/kestra-wd/tmp"

    secrets:
      - name: pg-cluster-secret
      - name: s3-creds

    common:
      nodeSelector:
        kubernetes.io/hostname: talos-worker-eu-02
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0

    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: kestra.${SECRET_EXTERNAL_DOMAIN}
      hosts:
        - host: kestra.${SECRET_EXTERNAL_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
