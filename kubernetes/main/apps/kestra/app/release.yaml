---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kestra
  namespace: kestra
spec:
  interval: 30m
  chart:
    spec:
      chart: kestra
      version: "1.0.36"
      sourceRef:
        kind: HelmRepository
        name: kestra
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployments:
      standalone:
        enabled: true
        workerThreads: 0
        dind:
          enabled: false
      webserver:
        enabled: false
      executor:
        enabled: false
      indexer:
        enabled: false
      scheduler:
        enabled: false
      worker:
        enabled: false

    configurations:
      application:
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: "/tmp/kestra-wd/tmp"
      # Include secret YAML fragments into the rendered _default.yml
      secrets:
        - name: kestra-db-creds
          key: datasource.yml
        - name: kestra-db-creds
          key: storage.yml

    common:
      nodeSelector:
        kubernetes.io/hostname: talos-worker-eu-02
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0

    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: kestra.${SECRET_EXTERNAL_DOMAIN}
      hosts:
        - host: kestra.${SECRET_EXTERNAL_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
