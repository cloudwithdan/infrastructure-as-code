---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goriva-si-influxdb
  namespace: goriva-si
spec:
  interval: 30m
  chart:
    spec:
      chart: influxdb2
      version: "2.1.2"
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    nodeSelector:
      kubernetes.io/hostname: talos-worker-eu-02
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    adminUser:
      organization: "goriva-si"
      bucket: "goriva-si"
      user: "admin"
      # Password and token stored in secret.sops.yaml
      existingSecret: "influxdb-admin-credentials"
    service:
      type: ClusterIP
      port: 8086
    ingress:
      enabled: false
