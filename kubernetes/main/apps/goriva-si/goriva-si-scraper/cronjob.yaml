---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: goriva-si-scraper
  namespace: goriva-si
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: goriva-si-scraper
              image: ghcr.io/cloudwithdan/goriva-si-scraper:latest
              imagePullPolicy: Always
              env:
                - name: INFLUXDB_URL
                  value: "http://goriva-si-influxdb-influxdb2.goriva-si.svc.cluster.local:8086"
                - name: INFLUXDB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: influxdb-scraper-credentials
                      key: token
                - name: INFLUXDB_ORG
                  value: "gorivasi"
                - name: INFLUXDB_BUCKET
                  value: "gorivasi"
                - name: LOG_LEVEL
                  value: "INFO"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
          nodeSelector:
            kubernetes.io/hostname: talos-worker-eu-02
          securityContext:
            fsGroup: 1000
