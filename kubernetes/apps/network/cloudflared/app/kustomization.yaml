---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./secret.sops.yaml
  - ./dnsendpoint.yaml
  - ./release.yaml
configMapGenerator:
  - name: cloudflared-configmap
    namespace: cloudflared
    files:
      - ./config/config.yaml
generatorOptions:
  disableNameSuffixHash: true
