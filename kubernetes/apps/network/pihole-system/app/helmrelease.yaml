---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pihole
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: pihole
      version: 2.35.0
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: flux-system
  values:
    image:
      tag: "2026.02.0"

    DNS1: "127.0.0.1#5053"

    doh:
      enabled: true
      repository: "crazymax/cloudflared"
      tag: latest
      pullPolicy: IfNotPresent
      envVars:
        TUNNEL_DNS_UPSTREAM: "https://1.1.1.1/dns-query,https://1.0.0.1/dns-query"

    persistentVolumeClaim:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: "1Gi"
      storageClass: "longhorn"

    ingress:
      enabled: true
      ingressClassName: internal
      hosts:
        - "pihole.${SECRET_INTERNAL_DOMAIN}"

    extraEnvVars:
      FTLCONF_webserver_port: "80"
      FTLCONF_dns_dnssec: "true"
      FTLCONF_dns_interface: "eth0"
      FTLCONF_dns_listeningMode: "all"

    serviceWeb:
      loadBalancerIP: 10.0.10.200
      type: LoadBalancer

    serviceDns:
      loadBalancerIP: 10.0.10.200
      type: LoadBalancer

    replicaCount: 1

    nodeSelector:
      kubernetes.io/hostname: talos-worker-eu-02