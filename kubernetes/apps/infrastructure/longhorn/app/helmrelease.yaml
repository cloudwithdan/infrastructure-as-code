---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app longhorn
  namespace: infrastructure
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.8.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    persistence:
      defaultClass: true
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      systemManagedPodsNodeSelector: "kubernetes.io/os:linux"
