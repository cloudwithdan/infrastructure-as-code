---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns
  namespace: infrastructure
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    fullnameOverride: *app
    provider: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-secret
            key: api-token
    extraArgs:
      - --ingress-class=external
      - --cloudflare-proxied
      - --default-targets=${SECRET_CLOUDFLARE_TUNNEL_ID}.cfargotunnel.com
    policy: sync
    sources: ["crd", "ingress"]
    domainFilters: ["${SECRET_EXTERNAL_DOMAIN}"]
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: external-dns-secret
---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-pihole
  namespace: infrastructure
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    fullnameOverride: *app
    provider: pihole
    policy: upsert-only
    registry: noop
    env:
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        value: ${PIHOLE_PASSWORD}
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: http://pihole-web.network.svc.cluster.local
    extraArgs:
      - --pihole-api-version=6
      - --ingress-class=internal
    serviceAccount:
      create: true
      name: "external-dns-pihole"
    sources: ["service", "ingress"]
    serviceMonitor:
      enabled: true
    podSecurityContext:
      fsGroup: 65534