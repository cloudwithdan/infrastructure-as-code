---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: cilium-pool
spec:
  cidrs:
    - cidr: 10.0.10.192/26
  disabled: false
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: cilium-l2-policy
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  externalIPs: false
  loadBalancerIPs: true
  interfaces:
    - eth0
    - en.*
    - eth.*
