apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: security
spec:
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: "2025.2.2"
      sourceRef:
        kind: HelmRepository
        name: goauthentik
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    authentik:
      secret_key: "${AUTHENTIK_KEY}"
      error_reporting:
        enabled: false
      postgresql:
        password: "${AUTHENTIK_POSTGRES_PASSWORD}"
    redis:
      enabled: true
      master:
        persistence:
          size: 1Gi
          storageClass: longhorn
