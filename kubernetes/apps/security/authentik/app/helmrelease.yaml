---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
  namespace: security
spec:
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: "2025.8.4"
      sourceRef:
        kind: HelmRepository
        name: goauthentik
        namespace: flux-system
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    global:
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"

      env:
        - name: AUTHENTIK_REDIS__HOST
          value: "authentik-redis.security.svc.cluster.local"

      envFrom:
        - secretRef:
            name: authentik

    # Authentik configuration
    authentik:
      # Don't create a secret - we provide credentials via global.envFrom
      enabled: false
      log_level: info
      error_reporting:
        enabled: false

      # Database config (actual values come from secret via env vars)
      postgresql:
        host: "postgres18-rw.database.svc.cluster.local"
        port: 5432
        name: "authentik"
        user: "authentik"

    # Server configuration
    server:
      replicas: 1

      # Init containers
      initContainers:
        # Ensure database exists
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          envFrom:
            - secretRef:
                name: authentik

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi

      # Enable metrics for monitoring
      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

      # Use standard Kubernetes Ingress (Traefik will handle it)
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - "auth.${SECRET_EXTERNAL_DOMAIN}"
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: authentik-tls
            hosts:
              - "auth.${SECRET_EXTERNAL_DOMAIN}"

      service:
        type: ClusterIP

    # Worker configuration
    worker:
      replicas: 1

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

    # Redis configuration (bundled)
    redis:
      enabled: false

    # Disable bundled PostgreSQL (using external postgres18)
    postgresql:
      enabled: false

    # Prometheus rules
    prometheus:
      rules:
        enabled: false
